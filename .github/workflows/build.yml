name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macOS-x64
          # Windows
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows-x64
          - platform: windows-11-arm
            target: aarch64-pc-windows-msvc
            name: Windows-arm64
          # Linux
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: Linux-x64
          - platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            name: Linux-arm64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Linux: install system dependencies for Tauri
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm xdg-utils

      - name: Install frontend dependencies
        run: npm ci

      # macOS: Import signing certificate from secrets
      - name: Import macOS signing certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          # macOS signing + notarization
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ runner.os == 'macOS' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "DebridDownloader ${{ github.ref_name }}"
          releaseBody: |
            ## Downloads

            | Platform | Architecture | File |
            |----------|-------------|------|
            | macOS | Apple Silicon (M1/M2/M3) | `.dmg` (aarch64) |
            | macOS | Intel | `.dmg` (x64) |
            | Windows | x64 | `.exe` installer |
            | Windows | ARM64 | `.exe` installer |
            | Linux | x64 | `.deb` / `.rpm` / `.AppImage` |
            | Linux | ARM64 | `.deb` / `.rpm` / `.AppImage` |
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: --target ${{ matrix.target }}

  # After all builds finish, generate a single latest.json from the release assets
  publish-updater:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Generate updater JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          REPO="${GITHUB_REPOSITORY}"
          VERSION="${TAG#v}"

          # Get the draft release for this tag
          RELEASE=$(gh api "repos/${REPO}/releases" --jq ".[] | select(.tag_name == \"${TAG}\")")
          RELEASE_ID=$(echo "$RELEASE" | jq -r '.id')
          PUB_DATE=$(echo "$RELEASE" | jq -r '.created_at')
          NOTES=$(echo "$RELEASE" | jq -r '.body // ""')

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "ERROR: No release found for tag ${TAG}"
            exit 1
          fi

          # Get all assets
          ASSETS=$(gh api "repos/${REPO}/releases/${RELEASE_ID}/assets")

          # Helper: find asset URL by exact name suffix
          asset_url() {
            echo "$ASSETS" | jq -r --arg suffix "$1" \
              '[.[] | select(.name | endswith($suffix)) | .browser_download_url][0] // ""'
          }

          # Helper: download .sig file content by exact name suffix
          sig_content() {
            local asset_id
            asset_id=$(echo "$ASSETS" | jq -r --arg suffix "$1" \
              '[.[] | select(.name | endswith($suffix)) | .id][0] // empty')
            if [ -n "$asset_id" ]; then
              gh api -H "Accept: application/octet-stream" \
                "repos/${REPO}/releases/assets/${asset_id}" 2>/dev/null || echo ""
            else
              echo ""
            fi
          }

          # Build platforms object using exact filename suffixes
          # macOS aarch64
          DARWIN_AARCH64_URL=$(asset_url "_aarch64.app.tar.gz")
          DARWIN_AARCH64_SIG=$(sig_content "_aarch64.app.tar.gz.sig")

          # macOS x86_64
          DARWIN_X64_URL=$(asset_url "_x64.app.tar.gz")
          DARWIN_X64_SIG=$(sig_content "_x64.app.tar.gz.sig")

          # Windows x86_64
          WINDOWS_X64_URL=$(asset_url "_x64-setup.nsis.zip")
          WINDOWS_X64_SIG=$(sig_content "_x64-setup.nsis.zip.sig")

          # Windows aarch64
          WINDOWS_AARCH64_URL=$(asset_url "_arm64-setup.nsis.zip")
          WINDOWS_AARCH64_SIG=$(sig_content "_arm64-setup.nsis.zip.sig")

          # Linux x86_64
          LINUX_X64_URL=$(asset_url "_amd64.AppImage.tar.gz")
          LINUX_X64_SIG=$(sig_content "_amd64.AppImage.tar.gz.sig")

          # Linux aarch64
          LINUX_AARCH64_URL=$(asset_url "_aarch64.AppImage.tar.gz")
          LINUX_AARCH64_SIG=$(sig_content "_aarch64.AppImage.tar.gz.sig")

          echo "=== Platform URLs found ==="
          echo "darwin-aarch64: ${DARWIN_AARCH64_URL:-MISSING}"
          echo "darwin-x86_64:  ${DARWIN_X64_URL:-MISSING}"
          echo "windows-x86_64: ${WINDOWS_X64_URL:-MISSING}"
          echo "windows-aarch64: ${WINDOWS_AARCH64_URL:-MISSING}"
          echo "linux-x86_64:  ${LINUX_X64_URL:-MISSING}"
          echo "linux-aarch64: ${LINUX_AARCH64_URL:-MISSING}"

          # Build JSON with jq
          LATEST_JSON=$(jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            --arg darwin_aarch64_url "$DARWIN_AARCH64_URL" \
            --arg darwin_aarch64_sig "$DARWIN_AARCH64_SIG" \
            --arg darwin_x64_url "$DARWIN_X64_URL" \
            --arg darwin_x64_sig "$DARWIN_X64_SIG" \
            --arg windows_x64_url "$WINDOWS_X64_URL" \
            --arg windows_x64_sig "$WINDOWS_X64_SIG" \
            --arg windows_aarch64_url "$WINDOWS_AARCH64_URL" \
            --arg windows_aarch64_sig "$WINDOWS_AARCH64_SIG" \
            --arg linux_x64_url "$LINUX_X64_URL" \
            --arg linux_x64_sig "$LINUX_X64_SIG" \
            --arg linux_aarch64_url "$LINUX_AARCH64_URL" \
            --arg linux_aarch64_sig "$LINUX_AARCH64_SIG" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: (
                {}
                | if $darwin_aarch64_url != "" then . + {"darwin-aarch64": {signature: $darwin_aarch64_sig, url: $darwin_aarch64_url}} else . end
                | if $darwin_x64_url != "" then . + {"darwin-x86_64": {signature: $darwin_x64_sig, url: $darwin_x64_url}} else . end
                | if $windows_x64_url != "" then . + {"windows-x86_64": {signature: $windows_x64_sig, url: $windows_x64_url}} else . end
                | if $windows_aarch64_url != "" then . + {"windows-aarch64": {signature: $windows_aarch64_sig, url: $windows_aarch64_url}} else . end
                | if $linux_x64_url != "" then . + {"linux-x86_64": {signature: $linux_x64_sig, url: $linux_x64_url}} else . end
                | if $linux_aarch64_url != "" then . + {"linux-aarch64": {signature: $linux_aarch64_sig, url: $linux_aarch64_url}} else . end
              )
            }')

          echo "$LATEST_JSON" > latest.json
          echo "Generated latest.json:"
          cat latest.json

          # Delete existing latest.json asset if present
          EXISTING_ID=$(echo "$ASSETS" | jq -r '.[] | select(.name == "latest.json") | .id' | head -1)
          if [ -n "$EXISTING_ID" ] && [ "$EXISTING_ID" != "null" ]; then
            gh api -X DELETE "repos/${REPO}/releases/assets/${EXISTING_ID}"
            echo "Deleted existing latest.json asset"
          fi

          # Upload latest.json
          gh release upload "$TAG" latest.json --repo "$REPO" --clobber
          echo "Uploaded latest.json to release ${TAG}"

  # Separate job for build checks (workflow_dispatch, no release)
  build-check:
    if: github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm xdg-utils

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          args: --target ${{ matrix.target }}
