name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macOS-x64
          # Windows
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows-x64
          - platform: windows-11-arm
            target: aarch64-pc-windows-msvc
            name: Windows-arm64
          # Linux
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: Linux-x64
          - platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            name: Linux-arm64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Linux: install system dependencies for Tauri
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm xdg-utils

      - name: Install frontend dependencies
        run: npm ci

      # macOS: Import signing certificate from secrets
      - name: Import macOS signing certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      # Build only — no release upload (tauri-action race conditions corrupt assets)
      - name: Build Tauri app
        id: tauri-build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          # macOS signing + notarization
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ runner.os == 'macOS' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}
        with:
          args: --target ${{ matrix.target }}

      # Upload all build artifacts for the publish job
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.name }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/
          if-no-files-found: error

  # Single job creates release and uploads everything — no race conditions
  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: List all artifacts
        run: find artifacts -type f | sort

      - name: Create release and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY}"
          VERSION="${TAG#v}"

          # Create draft release
          RELEASE_ID=$(gh api "repos/${REPO}/releases" \
            -f tag_name="${TAG}" \
            -f name="DebridDownloader ${TAG}" \
            -f body="## Downloads

          | Platform | Architecture | File |
          |----------|-------------|------|
          | macOS | Apple Silicon (M1/M2/M3) | \`.dmg\` (aarch64) |
          | macOS | Intel | \`.dmg\` (x64) |
          | Windows | x64 | \`.exe\` installer |
          | Windows | ARM64 | \`.exe\` installer |
          | Linux | x64 | \`.deb\` / \`.rpm\` / \`.AppImage\` |
          | Linux | ARM64 | \`.deb\` / \`.rpm\` / \`.AppImage\` |" \
            -F draft=true \
            -F prerelease=false \
            --jq '.id')

          echo "Created draft release ${RELEASE_ID}"

          # Rename macOS .app.tar.gz files to include architecture
          # (both builds produce DebridDownloader.app.tar.gz with no arch suffix)
          for dir in artifacts/artifacts-macOS-arm64 artifacts/artifacts-macOS-x64; do
            [ -d "$dir" ] || continue
            if [[ "$dir" == *arm64* ]]; then ARCH="_aarch64"; else ARCH="_x64"; fi
            for f in "$dir"/macos/DebridDownloader.app.tar.gz "$dir"/macos/DebridDownloader.app.tar.gz.sig; do
              [ -f "$f" ] || continue
              NEWNAME=$(echo "$(basename "$f")" | sed "s/DebridDownloader/DebridDownloader${ARCH}/")
              mv "$f" "$(dirname "$f")/${NEWNAME}"
              echo "Renamed $(basename "$f") -> ${NEWNAME}"
            done
          done

          # Collect all files to upload (skip .app bundles and icons)
          UPLOAD_FILES=()
          while IFS= read -r f; do
            [[ "$f" == *.app/* ]] && continue
            [[ "$f" == *"/icons/"* ]] && continue
            UPLOAD_FILES+=("$f")
          done < <(find artifacts -type f \
            \( -name "*.dmg" -o -name "*.exe" -o -name "*.msi" -o -name "*.deb" -o -name "*.rpm" \
               -o -name "*.AppImage" -o -name "*.AppImage.tar.gz" -o -name "*.AppImage.tar.gz.sig" \
               -o -name "*.AppImage.sig" \
               -o -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" \
               -o -name "*.nsis.zip" -o -name "*.nsis.zip.sig" \
               -o -name "*.msi.zip" -o -name "*.msi.zip.sig" \
               -o -name "*.deb.sig" -o -name "*.rpm.sig" \
               -o -name "*.dmg.sig" -o -name "*.exe.sig" -o -name "*.msi.sig" \) \
            | sort)

          echo "=== Files to upload (${#UPLOAD_FILES[@]}) ==="
          printf '%s\n' "${UPLOAD_FILES[@]}"

          # Upload each file
          for f in "${UPLOAD_FILES[@]}"; do
            BASENAME=$(basename "$f")
            echo "Uploading ${BASENAME}..."
            gh release upload "${TAG}" "$f" --repo "${REPO}" --clobber
          done

          echo "=== All assets uploaded ==="

          # Now generate latest.json from uploaded assets
          ASSETS=$(gh api "repos/${REPO}/releases/${RELEASE_ID}/assets?per_page=100")

          asset_url() {
            echo "$ASSETS" | jq -r --arg suffix "$1" \
              '[.[] | select(.name | endswith($suffix)) | .browser_download_url][0] // ""'
          }

          sig_content() {
            local asset_id
            asset_id=$(echo "$ASSETS" | jq -r --arg suffix "$1" \
              '[.[] | select(.name | endswith($suffix)) | .id][0] // empty')
            if [ -n "$asset_id" ]; then
              gh api -H "Accept: application/octet-stream" \
                "repos/${REPO}/releases/assets/${asset_id}" 2>/dev/null || echo ""
            else
              echo ""
            fi
          }

          # macOS
          DARWIN_AARCH64_URL=$(asset_url "_aarch64.app.tar.gz")
          DARWIN_AARCH64_SIG=$(sig_content "_aarch64.app.tar.gz.sig")
          DARWIN_X64_URL=$(asset_url "_x64.app.tar.gz")
          DARWIN_X64_SIG=$(sig_content "_x64.app.tar.gz.sig")

          # Windows
          WINDOWS_X64_URL=$(asset_url "_x64-setup.nsis.zip")
          WINDOWS_X64_SIG=$(sig_content "_x64-setup.nsis.zip.sig")
          WINDOWS_AARCH64_URL=$(asset_url "_arm64-setup.nsis.zip")
          WINDOWS_AARCH64_SIG=$(sig_content "_arm64-setup.nsis.zip.sig")

          # Linux
          LINUX_X64_URL=$(asset_url "_amd64.AppImage.tar.gz")
          LINUX_X64_SIG=$(sig_content "_amd64.AppImage.tar.gz.sig")
          LINUX_AARCH64_URL=$(asset_url "_aarch64.AppImage.tar.gz")
          LINUX_AARCH64_SIG=$(sig_content "_aarch64.AppImage.tar.gz.sig")

          echo "=== Platform URLs ==="
          echo "darwin-aarch64: ${DARWIN_AARCH64_URL:-MISSING}"
          echo "darwin-x86_64:  ${DARWIN_X64_URL:-MISSING}"
          echo "windows-x86_64: ${WINDOWS_X64_URL:-MISSING}"
          echo "windows-aarch64: ${WINDOWS_AARCH64_URL:-MISSING}"
          echo "linux-x86_64:  ${LINUX_X64_URL:-MISSING}"
          echo "linux-aarch64: ${LINUX_AARCH64_URL:-MISSING}"

          LATEST_JSON=$(jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg darwin_aarch64_url "$DARWIN_AARCH64_URL" \
            --arg darwin_aarch64_sig "$DARWIN_AARCH64_SIG" \
            --arg darwin_x64_url "$DARWIN_X64_URL" \
            --arg darwin_x64_sig "$DARWIN_X64_SIG" \
            --arg windows_x64_url "$WINDOWS_X64_URL" \
            --arg windows_x64_sig "$WINDOWS_X64_SIG" \
            --arg windows_aarch64_url "$WINDOWS_AARCH64_URL" \
            --arg windows_aarch64_sig "$WINDOWS_AARCH64_SIG" \
            --arg linux_x64_url "$LINUX_X64_URL" \
            --arg linux_x64_sig "$LINUX_X64_SIG" \
            --arg linux_aarch64_url "$LINUX_AARCH64_URL" \
            --arg linux_aarch64_sig "$LINUX_AARCH64_SIG" \
            '{
              version: $version,
              pub_date: $pub_date,
              platforms: (
                {}
                | if $darwin_aarch64_url != "" then . + {"darwin-aarch64": {signature: $darwin_aarch64_sig, url: $darwin_aarch64_url}} else . end
                | if $darwin_x64_url != "" then . + {"darwin-x86_64": {signature: $darwin_x64_sig, url: $darwin_x64_url}} else . end
                | if $windows_x64_url != "" then . + {"windows-x86_64": {signature: $windows_x64_sig, url: $windows_x64_url}} else . end
                | if $windows_aarch64_url != "" then . + {"windows-aarch64": {signature: $windows_aarch64_sig, url: $windows_aarch64_url}} else . end
                | if $linux_x64_url != "" then . + {"linux-x86_64": {signature: $linux_x64_sig, url: $linux_x64_url}} else . end
                | if $linux_aarch64_url != "" then . + {"linux-aarch64": {signature: $linux_aarch64_sig, url: $linux_aarch64_url}} else . end
              )
            }')

          echo "$LATEST_JSON" > latest.json
          echo "=== latest.json ==="
          cat latest.json
          gh release upload "${TAG}" latest.json --repo "${REPO}" --clobber
          # Publish the release (so /releases/latest/download/latest.json works)
          gh api -X PATCH "repos/${REPO}/releases/${RELEASE_ID}" -F draft=false
          echo "Published release ${TAG}"

  # Separate job for build checks (workflow_dispatch, no release)
  build-check:
    if: github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm xdg-utils

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          args: --target ${{ matrix.target }}
